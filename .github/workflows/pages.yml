# Publishes the landing page to GitHub Pages.
# The landing page includes the privacy policy at /privacy/.
# Repo settings: Settings → Pages → Build and deployment → Source: GitHub Actions.
# Public URL: https://<owner>.github.io/<repository>/

name: Deploy landing page (GitHub Pages)

on:
  push:
    branches: [main]
    paths:
      - 'landing/**'
      - 'docs/store-assets/privacy/**'
      - '.github/workflows/pages.yml'
      - 'public/icons/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 8

      - name: Install landing dependencies
        working-directory: ./landing
        run: pnpm install

      - name: Build landing page
        working-directory: ./landing
        run: pnpm run build

      - name: Copy privacy policy
        run: |
          mkdir -p landing/dist/privacy
          cp docs/store-assets/privacy/index.html landing/dist/privacy/index.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: landing/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
