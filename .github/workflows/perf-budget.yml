name: Performance Budget Check

on:
  pull_request:
    branches: [main, develop]
    types: [opened, synchronize, reopened]
  push:
    branches: [main]

env:
  CI: true
  NODE_VERSION: '20'

jobs:
  perf-budget:
    name: Check Performance Budgets
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v3
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build project
        run: pnpm run build

      - name: Verify perf-check CLI compiles
        run: pnpm run build:cli

      - name: Check performance budgets (golden profile fixture)
        id: budget_check
        env:
          PROFILE_FIXTURE: tests/fixtures/perf-profile-passing.json
        run: |
          set -euo pipefail
          if [ ! -f "$PROFILE_FIXTURE" ]; then
            echo "Fixture missing: $PROFILE_FIXTURE"
            exit 1
          fi

          node scripts/perf-check-run.mjs \
            --config perf-budget.json \
            --format json \
            --output budget-result.json \
            --fail-on-warning \
            "$PROFILE_FIXTURE"

          node scripts/perf-check-run.mjs \
            --config perf-budget.json \
            --format human \
            "$PROFILE_FIXTURE" || true

      - name: Upload budget results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: performance-budget-results
          path: |
            budget-result.json
            tests/fixtures/perf-profile-passing.json
          retention-days: 30
          if-no-files-found: ignore

      - name: Parse budget results
        if: always()
        id: parse_results
        run: |
          if [ -f "budget-result.json" ]; then
            # perf-check JSON wraps profile checks under profileResult
            PASSED=$(node -e "const r=require('./budget-result.json'); console.log(r.passed ? 'true' : 'false')")
            TOTAL_VIOLATIONS=$(node -e "const r=require('./budget-result.json'); console.log(r.profileResult?.totalViolations ?? 0)")
            ERROR_COUNT=$(node -e "const r=require('./budget-result.json'); console.log(r.profileResult?.errorCount ?? 0)")
            WARNING_COUNT=$(node -e "const r=require('./budget-result.json'); console.log(r.profileResult?.warningCount ?? 0)")
            PERF_SCORE=$(node -e "const r=require('./budget-result.json'); console.log(r.profileResult?.summary?.performanceScore ?? 0)")
            
            echo "passed=$PASSED" >> $GITHUB_OUTPUT
            echo "total_violations=$TOTAL_VIOLATIONS" >> $GITHUB_OUTPUT
            echo "error_count=$ERROR_COUNT" >> $GITHUB_OUTPUT
            echo "warning_count=$WARNING_COUNT" >> $GITHUB_OUTPUT
            echo "perf_score=$PERF_SCORE" >> $GITHUB_OUTPUT
            
            # Generate summary for GitHub step summary
            echo "## 📊 Performance Budget Check Results" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            
            if [ "$PASSED" = "true" ]; then
              echo "✅ **All performance budgets passed!**" >> $GITHUB_STEP_SUMMARY
            else
              echo "❌ **Performance budget check failed**" >> $GITHUB_STEP_SUMMARY
            fi
            
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
            echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
            echo "| Performance Score | ${PERF_SCORE}/100 |" >> $GITHUB_STEP_SUMMARY
            echo "| Total Violations | ${TOTAL_VIOLATIONS} |" >> $GITHUB_STEP_SUMMARY
            echo "| Errors | ${ERROR_COUNT} |" >> $GITHUB_STEP_SUMMARY
            echo "| Warnings | ${WARNING_COUNT} |" >> $GITHUB_STEP_SUMMARY
            
            # List violations if any
            if [ "$TOTAL_VIOLATIONS" -gt 0 ]; then
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "### Violations" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
              
              node -e "
                const result = require('./budget-result.json');
                const violations = result.profileResult?.violations || [];
                violations.forEach(v => {
                  const icon = v.severity === 'error' ? '🔴' : v.severity === 'warning' ? '🟡' : '🔵';
                  console.log('- ' + icon + ' **' + v.budgetName + '**: ' + v.message);
                });
              " >> $GITHUB_STEP_SUMMARY
            fi
          fi

      - name: Comment PR
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            
            // Read results
            let result;
            try {
              result = JSON.parse(fs.readFileSync('budget-result.json', 'utf-8'));
            } catch (e) {
              console.log('Could not read budget results');
              return;
            }
            
            const profile = result.profileResult;
            if (!profile) {
              console.log('No profileResult in budget output');
              return;
            }
            
            // Determine status
            const status = result.passed ? '✅ PASSED' : '❌ FAILED';
            const score = Math.round(profile.summary?.performanceScore ?? 0);
            
            // Create comment body
            let body = `## 📊 Performance Budget Check: ${status}\n\n`;
            body += `**Overall Score:** ${score}/100\n\n`;
            
            // Add violations table
            const violations = profile.violations || [];
            if (violations.length > 0) {
              body += '| Severity | Budget | Message |\n';
              body += '|----------|--------|---------|\n';
              
              violations.slice(0, 10).forEach(v => {
                const severity = v.severity === 'error' ? '🔴 Error' : v.severity === 'warning' ? '🟡 Warning' : '🔵 Info';
                body += `| ${severity} | ${v.budgetName} | ${v.message} |\n`;
              });
              
              if (violations.length > 10) {
                body += `\n*...and ${violations.length - 10} more violations*\n`;
              }
            } else {
              body += '🎉 No budget violations detected!\n';
            }
            
            body += '\n---\n';
            body += `<sub>Checked at: ${new Date().toISOString()}</sub>`;
            
            // Find existing comment
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number
            });
            
            const botComment = comments.find(comment => 
              comment.user?.type === 'Bot' && 
              comment.body?.includes('Performance Budget Check')
            );
            
            // Update or create comment
            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body
              });
            }
