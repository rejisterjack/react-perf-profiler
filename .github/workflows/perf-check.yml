name: Performance Check

on:
  pull_request:
    branches: [main, develop]
    types: [opened, synchronize, reopened]
  push:
    branches: [main]
  workflow_dispatch:

env:
  CI: true
  NODE_VERSION: '20'

jobs:
  perf-check:
    name: Performance & Bundle Check
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
      checks: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v3
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Build Chrome extension and analyze bundle
      - name: Build Chrome extension
        run: pnpm run build

      - name: Analyze Chrome bundle sizes
        id: chrome_bundle
        run: |
          echo "## Chrome Extension Bundle Analysis" >> bundle-report.md
          echo "" >> bundle-report.md
          echo "| Chunk | Size | Budget | Status |" >> bundle-report.md
          echo "|-------|------|--------|--------|" >> bundle-report.md
          
          TOTAL_SIZE=0
          BUDGET_EXCEEDED=false
          
          # Check main chunks
          for file in dist-chrome/assets/*.js; do
            if [ -f "$file" ]; then
              BASENAME=$(basename "$file")
              SIZE=$(stat -c%s "$file" 2>/dev/null || stat -f%z "$file")
              SIZE_KB=$((SIZE / 1024))
              TOTAL_SIZE=$((TOTAL_SIZE + SIZE))
              
              # Set budget based on chunk type
              case "$BASENAME" in
                *panel*) BUDGET=500; BUDGET_NAME="Panel";;
                *background*) BUDGET=100; BUDGET_NAME="Background";;
                *content*) BUDGET=150; BUDGET_NAME="Content";;
                *devtools*) BUDGET=50; BUDGET_NAME="Devtools";;
                *popup*) BUDGET=100; BUDGET_NAME="Popup";;
                *) BUDGET=300; BUDGET_NAME="Other";;
              esac
              
              if [ $SIZE_KB -gt $BUDGET ]; then
                STATUS="🔴 Fail"
                BUDGET_EXCEEDED=true
              else
                STATUS="✅ Pass"
              fi
              
              echo "| $BUDGET_NAME | ${SIZE_KB}KB | ${BUDGET}KB | $STATUS |" >> bundle-report.md
              echo "${BUDGET_NAME}_SIZE=${SIZE_KB}" >> $GITHUB_ENV
              echo "${BUDGET_NAME}_BUDGET=${BUDGET}" >> $GITHUB_ENV
            fi
          done
          
          TOTAL_SIZE_KB=$((TOTAL_SIZE / 1024))
          TOTAL_BUDGET=1000
          
          if [ $TOTAL_SIZE_KB -gt $TOTAL_BUDGET ]; then
            TOTAL_STATUS="🔴 Fail"
            BUDGET_EXCEEDED=true
          else
            TOTAL_STATUS="✅ Pass"
          fi
          
          echo "| **Total** | **${TOTAL_SIZE_KB}KB** | **${TOTAL_BUDGET}KB** | **$TOTAL_STATUS** |" >> bundle-report.md
          echo "" >> bundle-report.md
          
          echo "total_size=${TOTAL_SIZE_KB}" >> $GITHUB_OUTPUT
          echo "total_budget=${TOTAL_BUDGET}" >> $GITHUB_OUTPUT
          echo "budget_exceeded=${BUDGET_EXCEEDED}" >> $GITHUB_OUTPUT
          echo "BUDGET_EXCEEDED=${BUDGET_EXCEEDED}" >> $GITHUB_ENV

      # Build Firefox extension
      - name: Build Firefox extension
        run: pnpm run build:firefox

      - name: Analyze Firefox bundle sizes
        id: firefox_bundle
        run: |
          echo "## Firefox Extension Bundle Analysis" >> bundle-report.md
          echo "" >> bundle-report.md
          echo "| Chunk | Size | Budget | Status |" >> bundle-report.md
          echo "|-------|------|--------|--------|" >> bundle-report.md
          
          TOTAL_SIZE=0
          
          for file in dist-firefox/assets/*.js; do
            if [ -f "$file" ]; then
              BASENAME=$(basename "$file")
              SIZE=$(stat -c%s "$file" 2>/dev/null || stat -f%z "$file")
              SIZE_KB=$((SIZE / 1024))
              TOTAL_SIZE=$((TOTAL_SIZE + SIZE))
              
              case "$BASENAME" in
                *panel*) BUDGET=500; BUDGET_NAME="Panel";;
                *background*) BUDGET=100; BUDGET_NAME="Background";;
                *content*) BUDGET=150; BUDGET_NAME="Content";;
                *devtools*) BUDGET=50; BUDGET_NAME="Devtools";;
                *popup*) BUDGET=100; BUDGET_NAME="Popup";;
                *) BUDGET=300; BUDGET_NAME="Other";;
              esac
              
              if [ $SIZE_KB -gt $BUDGET ]; then
                STATUS="🔴 Fail"
              else
                STATUS="✅ Pass"
              fi
              
              echo "| $BUDGET_NAME | ${SIZE_KB}KB | ${BUDGET}KB | $STATUS |" >> bundle-report.md
            fi
          done
          
          TOTAL_SIZE_KB=$((TOTAL_SIZE / 1024))
          echo "| **Total** | **${TOTAL_SIZE_KB}KB** | **1000KB** | - |" >> bundle-report.md
          echo "" >> bundle-report.md

      # Run tests with coverage
      - name: Run tests with coverage
        id: test_coverage
        run: |
          pnpm test -- --coverage --reporter=json > test-results.json 2>&1 || true
          
          # Extract coverage from coverage report
          if [ -f coverage/coverage-summary.json ]; then
            LINES=$(node -e "console.log(require('./coverage/coverage-summary').total.lines.pct || 0)")
            FUNCTIONS=$(node -e "console.log(require('./coverage/coverage-summary').total.functions.pct || 0)")
            BRANCHES=$(node -e "console.log(require('./coverage/coverage-summary').total.branches.pct || 0)")
            STATEMENTS=$(node -e "console.log(require('./coverage/coverage-summary').total.statements.pct || 0)")
          else
            # Default values if coverage report not found
            LINES=0
            FUNCTIONS=0
            BRANCHES=0
            STATEMENTS=0
          fi
          
          # Coverage thresholds
          LINES_THRESHOLD=70
          FUNCTIONS_THRESHOLD=70
          BRANCHES_THRESHOLD=60
          STATEMENTS_THRESHOLD=70
          
          echo "## Test Coverage" >> bundle-report.md
          echo "" >> bundle-report.md
          echo "| Metric | Actual | Threshold | Status |" >> bundle-report.md
          echo "|--------|--------|-----------|--------|" >> bundle-report.md
          
          COVERAGE_FAILED=false
          
          if (( $(echo "$LINES < $LINES_THRESHOLD" | bc -l) )); then
            LINES_STATUS="🔴 Fail"
            COVERAGE_FAILED=true
          else
            LINES_STATUS="✅ Pass"
          fi
          echo "| Lines | ${LINES}% | ${LINES_THRESHOLD}% | $LINES_STATUS |" >> bundle-report.md
          
          if (( $(echo "$FUNCTIONS < $FUNCTIONS_THRESHOLD" | bc -l) )); then
            FUNCTIONS_STATUS="🔴 Fail"
            COVERAGE_FAILED=true
          else
            FUNCTIONS_STATUS="✅ Pass"
          fi
          echo "| Functions | ${FUNCTIONS}% | ${FUNCTIONS_THRESHOLD}% | $FUNCTIONS_STATUS |" >> bundle-report.md
          
          if (( $(echo "$BRANCHES < $BRANCHES_THRESHOLD" | bc -l) )); then
            BRANCHES_STATUS="🔴 Fail"
            COVERAGE_FAILED=true
          else
            BRANCHES_STATUS="✅ Pass"
          fi
          echo "| Branches | ${BRANCHES}% | ${BRANCHES_THRESHOLD}% | $BRANCHES_STATUS |" >> bundle-report.md
          
          if (( $(echo "$STATEMENTS < $STATEMENTS_THRESHOLD" | bc -l) )); then
            STATEMENTS_STATUS="🔴 Fail"
            COVERAGE_FAILED=true
          else
            STATEMENTS_STATUS="✅ Pass"
          fi
          echo "| Statements | ${STATEMENTS}% | ${STATEMENTS_THRESHOLD}% | $STATEMENTS_STATUS |" >> bundle-report.md
          echo "" >> bundle-report.md
          
          echo "lines=${LINES}" >> $GITHUB_OUTPUT
          echo "functions=${FUNCTIONS}" >> $GITHUB_OUTPUT
          echo "branches=${BRANCHES}" >> $GITHUB_OUTPUT
          echo "statements=${STATEMENTS}" >> $GITHUB_OUTPUT
          echo "coverage_failed=${COVERAGE_FAILED}" >> $GITHUB_OUTPUT
          echo "COVERAGE_FAILED=${COVERAGE_FAILED}" >> $GITHUB_ENV
        continue-on-error: true

      # Check performance budgets from perf-budget.json using CLI
      - name: Check performance budgets
        id: perf_budget
        run: |
          # Generate a sample profile for demonstration if none exists
          if [ ! -f "perf-profile.json" ]; then
            node -e "
              const fs = require('fs');
              const profile = {
                version: 1,
                recordingDuration: 5000,
                commits: Array.from({ length: 20 }, (_, i) => ({
                  id: 'commit-' + i,
                  timestamp: Date.now() + i * 100,
                  priorityLevel: 'Normal',
                  duration: 10 + Math.random() * 10,
                  fibers: [
                    {
                      id: 'fiber-' + i,
                      displayName: 'TestComponent',
                      actualDuration: 8 + Math.random() * 8,
                      selfBaseDuration: 4 + Math.random() * 4,
                      memoizedProps: {},
                      memoizedState: null,
                      tag: 0,
                      key: null,
                      child: null,
                      sibling: null,
                      return: null,
                      type: 'div',
                      elementType: 'div',
                      actualStartTime: 0,
                      treeBaseDuration: 0,
                      index: 0,
                      mode: 0,
                    }
                  ]
                })),
                rscPayloads: [],
                rscAnalysis: null
              };
              fs.writeFileSync('perf-profile.json', JSON.stringify(profile, null, 2));
            "
          fi
          
          # Run the budget check CLI using tsx
          pnpm exec tsx src/cli/perf-check.ts \
            --config perf-budget.json \
            --format json \
            --output budget-result.json \
            perf-profile.json 2>&1 || EXIT_CODE=$?
          
          if [ -f "budget-result.json" ]; then
            PASSED=$(node -e "console.log(require('./budget-result.json').passed ? 'true' : 'false')")
            TOTAL_VIOLATIONS=$(node -e "console.log(require('./budget-result.json').totalViolations)")
            ERROR_COUNT=$(node -e "console.log(require('./budget-result.json').errorCount)")
            WARNING_COUNT=$(node -e "console.log(require('./budget-result.json').warningCount)")
            PERF_SCORE=$(node -e "console.log(require('./budget-result.json').summary.performanceScore)")
            
            echo "passed=$PASSED" >> $GITHUB_OUTPUT
            echo "total_violations=$TOTAL_VIOLATIONS" >> $GITHUB_OUTPUT
            echo "error_count=$ERROR_COUNT" >> $GITHUB_OUTPUT
            echo "warning_count=$WARNING_COUNT" >> $GITHUB_OUTPUT
            echo "perf_score=$PERF_SCORE" >> $GITHUB_OUTPUT
            
            echo "## Performance Budgets" >> bundle-report.md
            echo "" >> bundle-report.md
            echo "| Check | Result |" >> bundle-report.md
            echo "|-------|--------|" >> bundle-report.md
            echo "| Overall Status | $([ \"$PASSED\" = \"true\" ] && echo '✅ Passed' || echo '🔴 Failed') |" >> bundle-report.md
            echo "| Performance Score | ${PERF_SCORE}/100 |" >> bundle-report.md
            echo "| Violations | ${TOTAL_VIOLATIONS} |" >> bundle-report.md
            echo "| Errors | ${ERROR_COUNT} |" >> bundle-report.md
            echo "| Warnings | ${WARNING_COUNT} |" >> bundle-report.md
            
            # List violations if any
            if [ "$TOTAL_VIOLATIONS" -gt 0 ]; then
              echo "" >> bundle-report.md
              echo "### Violations" >> bundle-report.md
              echo "" >> bundle-report.md
              
              node -e "
                const result = require('./budget-result.json');
                result.violations.slice(0, 10).forEach(v => {
                  const icon = v.severity === 'error' ? '🔴' : v.severity === 'warning' ? '🟡' : '🔵';
                  console.log('- ' + icon + ' **' + v.budgetName + '**: ' + v.message);
                });
              " >> bundle-report.md
            fi
          else
            echo "passed=true" >> $GITHUB_OUTPUT
            echo "perf_score=100" >> $GITHUB_OUTPUT
            echo "## Performance Budgets" >> bundle-report.md
            echo "" >> bundle-report.md
            echo "✅ No performance budget violations detected" >> bundle-report.md
          fi
          echo "" >> bundle-report.md
        continue-on-error: true

      # Check bundle sizes using CLI
      - name: Check bundle sizes with CLI
        id: bundle_cli
        run: |
          pnpm exec tsx src/cli/perf-check.ts \
            --check-bundles \
            --bundle-target both \
            --format json \
            --output bundle-check-result.json 2>&1 || true
        continue-on-error: true

      # Upload artifacts
      - name: Upload bundle analysis
        uses: actions/upload-artifact@v4
        with:
          name: bundle-analysis
          path: bundle-report.md
          retention-days: 30

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 30

      - name: Upload budget results
        uses: actions/upload-artifact@v4
        with:
          name: budget-results
          path: |
            budget-result.json
            bundle-check-result.json
            perf-profile.json
          retention-days: 30

      # Post PR comment
      - name: Comment PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            
            // Read bundle report
            let report;
            try {
              report = fs.readFileSync('bundle-report.md', 'utf-8');
            } catch (e) {
              report = '## 📊 Performance Report\n\nNo report available';
            }
            
            // Create comment body
            const bundleExceeded = process.env.BUDGET_EXCEEDED === 'true';
            const coverageFailed = process.env.COVERAGE_FAILED === 'true';
            const passed = !bundleExceeded && !coverageFailed;
            
            const status = passed ? '✅ PASSED' : '❌ FAILED';
            
            let body = `## 📊 Performance Report: ${status}\n\n`;
            body += report;
            body += '\n---\n';
            body += `<sub>Generated at: ${new Date().toISOString()} | Commit: ${context.sha.substring(0, 7)}</sub>`;
            
            // Find existing comment
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number
            });
            
            const botComment = comments.find(comment => 
              comment.user?.type === 'Bot' && 
              comment.body?.includes('📊 Performance Report')
            );
            
            // Update or create comment
            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body
              });
            }

      # Update GitHub Step Summary
      - name: Update step summary
        run: |
          echo "## 📊 Performance Check Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          cat bundle-report.md >> $GITHUB_STEP_SUMMARY
          
          if [ "${{ steps.chrome_bundle.outputs.budget_exceeded }}" = "true" ] || \
             [ "${{ steps.test_coverage.outputs.coverage_failed }}" = "true" ] || \
             [ "${{ steps.perf_budget.outputs.passed }}" = "false" ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "❌ **Performance check failed**" >> $GITHUB_STEP_SUMMARY
            exit 1
          else
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "✅ **All performance checks passed!**" >> $GITHUB_STEP_SUMMARY
          fi

      # Fail if budgets exceeded
      - name: Fail on budget violations
        if: |
          steps.chrome_bundle.outputs.budget_exceeded == 'true' || 
          steps.test_coverage.outputs.coverage_failed == 'true' ||
          steps.perf_budget.outputs.passed == 'false'
        run: |
          echo "::error::Performance budget check failed"
          echo "Bundle budget exceeded: ${{ steps.chrome_bundle.outputs.budget_exceeded }}"
          echo "Coverage failed: ${{ steps.test_coverage.outputs.coverage_failed }}"
          echo "Performance budget passed: ${{ steps.perf_budget.outputs.passed }}"
          exit 1
