name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 1.0.0)'
        required: true
        type: string

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v3
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test

      - name: Build extension
        run: pnpm run build

      - name: Get version
        id: get_version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_ENV
          else
            echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_ENV
          fi

      - name: Update manifest version
        run: |
          cd dist
          jq --arg version "$VERSION" '.version = $version' manifest.json > manifest.json.tmp
          mv manifest.json.tmp manifest.json

      - name: Create ZIP archive
        run: |
          cd dist
          zip -r ../react-perf-profiler-v${VERSION}.zip .
          cd ..

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        with:
          files: react-perf-profiler-v*.zip
          generate_release_notes: true
          draft: false
          prerelease: false

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: react-perf-profiler-v${{ env.VERSION }}
          path: react-perf-profiler-v${{ env.VERSION }}.zip

  # Chrome Web Store publishing (optional - requires setup)
  publish-chrome-web-store:
    runs-on: ubuntu-latest
    needs: build-and-release
    if: false # Enable this when Chrome Web Store credentials are configured
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: extension-dist
          path: dist

      - name: Create ZIP for Chrome Web Store
        run: |
          cd dist
          zip -r ../react-perf-profiler-chrome.zip .

      # Uncomment and configure when ready to publish
