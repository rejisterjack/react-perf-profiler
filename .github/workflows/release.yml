name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 1.0.0)'
        required: true
        type: string

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v3
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test

      - name: Build Chrome extension
        run: pnpm run build

      - name: Build Firefox extension
        run: pnpm run build:firefox

      - name: Get version
        id: get_version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_ENV
          else
            echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_ENV
          fi

      - name: Update Chrome manifest version
        run: |
          cd dist-chrome
          jq --arg version "$VERSION" '.version = $version' manifest.json > manifest.json.tmp
          mv manifest.json.tmp manifest.json

      - name: Update Firefox manifest version
        run: |
          cd dist-firefox
          jq --arg version "$VERSION" '.version = $version' manifest.json > manifest.json.tmp
          mv manifest.json.tmp manifest.json

      - name: Create Chrome ZIP archive
        run: |
          cd dist-chrome
          zip -r ../react-perf-profiler-chrome-v${VERSION}.zip .
          cd ..

      - name: Create Firefox ZIP archive
        run: |
          cd dist-firefox
          zip -r ../react-perf-profiler-firefox-v${VERSION}.zip .
          cd ..

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            react-perf-profiler-chrome-v*.zip
            react-perf-profiler-firefox-v*.zip
          generate_release_notes: true
          draft: false
          prerelease: false

      - name: Upload Chrome artifact
        uses: actions/upload-artifact@v4
        with:
          name: react-perf-profiler-chrome-v${{ env.VERSION }}
          path: react-perf-profiler-chrome-v${{ env.VERSION }}.zip

      - name: Upload Firefox artifact
        uses: actions/upload-artifact@v4
        with:
          name: react-perf-profiler-firefox-v${{ env.VERSION }}
          path: react-perf-profiler-firefox-v${{ env.VERSION }}.zip

  # Chrome Web Store publishing
  publish-chrome-web-store:
    runs-on: ubuntu-latest
    needs: build-and-release
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/') && vars.CHROME_PUBLISH_ENABLED == 'true'
    steps:
      - name: Download Chrome build artifact
        uses: actions/download-artifact@v4
        with:
          name: react-perf-profiler-chrome-v${{ env.VERSION }}
          path: dist-chrome

      - name: Upload to Chrome Web Store
        uses: mnao305/chrome-extension-upload@v4.0.1
        with:
          file-path: react-perf-profiler-chrome-v${{ env.VERSION }}.zip
          extension-id: ${{ secrets.CHROME_EXTENSION_ID }}
          client-id: ${{ secrets.CHROME_CLIENT_ID }}
          client-secret: ${{ secrets.CHROME_CLIENT_SECRET }}
          refresh-token: ${{ secrets.CHROME_REFRESH_TOKEN }}

  # Firefox Add-ons publishing
  publish-firefox-addons:
    runs-on: ubuntu-latest
    needs: build-and-release
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/') && vars.FIREFOX_PUBLISH_ENABLED == 'true'
    steps:
      - name: Download Firefox build artifact
        uses: actions/download-artifact@v4
        with:
          name: react-perf-profiler-firefox-v${{ env.VERSION }}
          path: dist-firefox

      - name: Upload to Firefox Add-ons
        uses: trmcnvn/firefox-addon@v1
        with:
          uuid: ${{ secrets.FIREFOX_EXTENSION_UUID }}
          xpi: react-perf-profiler-firefox-v${{ env.VERSION }}.zip
          manifest: dist-firefox/manifest.json
          api-key: ${{ secrets.FIREFOX_API_KEY }}
          api-secret: ${{ secrets.FIREFOX_API_SECRET }}
