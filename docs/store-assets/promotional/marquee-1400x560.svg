<?xml version="1.0" encoding="UTF-8"?>
<svg width="1400" height="560" viewBox="0 0 1400 560" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgMarquee" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#61DAFB"/>
      <stop offset="100%" stop-color="#FFD700"/>
    </linearGradient>
    <filter id="glowMarquee">
      <feGaussianBlur stdDeviation="5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1400" height="560" fill="url(#bgMarquee)"/>
  
  <!-- Left side: Branding and text -->
  <g transform="translate(120, 280)">
    <!-- React Logo -->
    <g transform="scale(1.2)" filter="url(#glowMarquee)">
      <circle cx="0" cy="0" r="18" fill="#61DAFB"/>
      <ellipse cx="0" cy="0" rx="50" ry="20" fill="none" stroke="#61DAFB" stroke-width="3" opacity="0.6"/>
      <ellipse cx="0" cy="0" rx="50" ry="20" fill="none" stroke="#61DAFB" stroke-width="3" opacity="0.6" transform="rotate(60)"/>
      <ellipse cx="0" cy="0" rx="50" ry="20" fill="none" stroke="#61DAFB" stroke-width="3" opacity="0.6" transform="rotate(120)"/>
    </g>
    
    <!-- Lightning -->
    <path d="M 70 -30 L 92 5 L 75 5 L 100 45 L 65 15 L 82 15 Z" 
          fill="#FFD700" stroke="#FFA500" stroke-width="2" filter="url(#glowMarquee)"/>
    
    <!-- Title -->
    <text x="150" y="-30" font-family="system-ui, -apple-system, sans-serif" 
          font-size="52" font-weight="bold" fill="#ffffff">
      React Perf Profiler
    </text>
    
    <!-- Tagline -->
    <text x="150" y="20" font-family="system-ui, -apple-system, sans-serif" 
          font-size="24" fill="#a0a0a0">
      Profile React Performance Like a Pro
    </text>
    
    <!-- Key features -->
    <g transform="translate(150, 70)">
      <rect x="0" y="0" width="140" height="32" rx="16" fill="#61DAFB" opacity="0.15"/>
      <text x="70" y="22" font-family="system-ui, sans-serif" font-size="14" 
            fill="#61DAFB" text-anchor="middle">Flamegraph</text>
      
      <rect x="155" y="0" width="140" height="32" rx="16" fill="#FFD700" opacity="0.15"/>
      <text x="225" y="22" font-family="system-ui, sans-serif" font-size="14" 
            fill="#FFD700" text-anchor="middle">Wasted Renders</text>
      
      <rect x="310" y="0" width="140" height="32" rx="16" fill="#4CAF50" opacity="0.15"/>
      <text x="380" y="22" font-family="system-ui, sans-serif" font-size="14" 
            fill="#4CAF50" text-anchor="middle">Memo Analysis</text>
      
      <rect x="465" y="0" width="140" height="32" rx="16" fill="#9C27B0" opacity="0.15"/>
      <text x="535" y="22" font-family="system-ui, sans-serif" font-size="14" 
            fill="#9C27B0" text-anchor="middle">RSC Support</text>
    </g>
  </g>
  
  <!-- Right side: Visual preview -->
  <g transform="translate(950, 80)">
    <!-- Mock DevTools panel -->
    <rect x="0" y="0" width="380" height="400" rx="8" fill="#0d1117" stroke="#30363d" stroke-width="2"/>
    
    <!-- Panel header -->
    <rect x="0" y="0" width="380" height="40" rx="8" fill="#161b22"/>
    <text x="20" y="26" font-family="monospace" font-size="14" fill="#ffffff">⚡ Perf Profiler</text>
    
    <!-- Mock flamegraph bars -->
    <g transform="translate(20, 60)">
      <rect x="0" y="0" width="340" height="24" rx="4" fill="#e74c3c" opacity="0.8"/>
      <text x="10" y="17" font-family="monospace" font-size="12" fill="#ffffff">App 45ms</text>
      
      <rect x="20" y="30" width="200" height="24" rx="4" fill="#f39c12" opacity="0.8"/>
      <text x="30" y="47" font-family="monospace" font-size="12" fill="#ffffff">Header 12ms</text>
      
      <rect x="20" y="60" width="280" height="24" rx="4" fill="#e74c3c" opacity="0.8"/>
      <text x="30" y="77" font-family="monospace" font-size="12" fill="#ffffff">Feed 89ms ⚠️</text>
      
      <rect x="40" y="90" width="150" height="24" rx="4" fill="#27ae60" opacity="0.8"/>
      <text x="50" y="107" font-family="monospace" font-size="12" fill="#ffffff">Post 23ms</text>
      
      <rect x="40" y="120" width="240" height="24" rx="4" fill="#e74c3c" opacity="0.8"/>
      <text x="50" y="137" font-family="monospace" font-size="12" fill="#ffffff">Comments 67ms ⚠️</text>
      
      <rect x="20" y="150" width="120" height="24" rx="4" fill="#f39c12" opacity="0.8"/>
      <text x="30" y="167" font-family="monospace" font-size="12" fill="#ffffff">Sidebar 34ms</text>
    </g>
    
    <!-- Stats panel -->
    <g transform="translate(20, 250)">
      <rect x="0" y="0" width="160" height="80" rx="4" fill="#161b22" stroke="#30363d" stroke-width="1"/>
      <text x="80" y="25" font-family="system-ui, sans-serif" font-size="12" fill="#a0a0a0" text-anchor="middle">Performance Score</text>
      <text x="80" y="55" font-family="system-ui, sans-serif" font-size="28" font-weight="bold" fill="#f39c12" text-anchor="middle">72</text>
      
      <rect x="180" y="0" width="160" height="80" rx="4" fill="#161b22" stroke="#30363d" stroke-width="1"/>
      <text x="260" y="25" font-family="system-ui, sans-serif" font-size="12" fill="#a0a0a0" text-anchor="middle">Wasted Renders</text>
      <text x="260" y="55" font-family="system-ui, sans-serif" font-size="28" font-weight="bold" fill="#e74c3c" text-anchor="middle">23%</text>
    </g>
    
    <!-- Recording indicator -->
    <circle cx="340" y="26" r="6" fill="#ff4444">
      <animate attributeName="opacity" values="1;0.3;1" dur="1.5s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>
