<?xml version="1.0" encoding="UTF-8"?>
<svg width="440" height="280" viewBox="0 0 440 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="440" height="280" fill="url(#bg)"/>
  
  <!-- React Logo (Simplified) -->
  <g transform="translate(80, 140)" filter="url(#glow)">
    <!-- Center -->
    <circle cx="0" cy="0" r="18" fill="#61DAFB"/>
    <!-- Orbital rings -->
    <ellipse cx="0" cy="0" rx="50" ry="20" fill="none" stroke="#61DAFB" stroke-width="3" opacity="0.6" transform="rotate(0)"/>
    <ellipse cx="0" cy="0" rx="50" ry="20" fill="none" stroke="#61DAFB" stroke-width="3" opacity="0.6" transform="rotate(60)"/>
    <ellipse cx="0" cy="0" rx="50" ry="20" fill="none" stroke="#61DAFB" stroke-width="3" opacity="0.6" transform="rotate(120)"/>
  </g>
  
  <!-- Lightning Bolt -->
  <path d="M 130 110 L 145 135 L 135 135 L 150 165 L 125 140 L 135 140 Z" 
        fill="#FFD700" stroke="#FFA500" stroke-width="2" filter="url(#glow)"/>
  
  <!-- Title -->
  <text x="220" y="125" font-family="system-ui, -apple-system, sans-serif" 
        font-size="28" font-weight="bold" fill="#ffffff" text-anchor="middle">
    React Perf Profiler
  </text>
  
  <!-- Tagline -->
  <text x="220" y="155" font-family="system-ui, -apple-system, sans-serif" 
        font-size="16" fill="#a0a0a0" text-anchor="middle">
    Profile React Performance
  </text>
  
  <!-- Feature badges -->
  <g transform="translate(220, 200)">
    <rect x="-80" y="-12" width="60" height="24" rx="12" fill="#61DAFB" opacity="0.2"/>
    <text x="-50" y="4" font-family="system-ui, sans-serif" font-size="11" 
          fill="#61DAFB" text-anchor="middle">Flamegraph</text>
    
    <rect x="-20" y="-12" width="60" height="24" rx="12" fill="#FFD700" opacity="0.2"/>
    <text x="10" y="4" font-family="system-ui, sans-serif" font-size="11" 
          fill="#FFD700" text-anchor="middle">Memo Analysis</text>
    
    <rect x="50" y="-12" width="50" height="24" rx="12" fill="#4CAF50" opacity="0.2"/>
    <text x="75" y="4" font-family="system-ui, sans-serif" font-size="11" 
          fill="#4CAF50" text-anchor="middle">RSC</text>
  </g>
</svg>
