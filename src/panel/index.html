<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>React Perf Profiler</title>
  <style>
    /* Critical CSS — matches global.css design tokens for flash-free load */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body, #root {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
    html {
      font-size: 16px;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    body {
      font-family: system-ui, sans-serif;
      font-size: 12px;
      font-weight: 400;
      line-height: 1.5;
      background: #0d1117;
      color: #c9d1d9;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    /* Loading state */
    #loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      height: 100%;
    }
    .spinner {
      width: 28px;
      height: 28px;
      border: 2px solid #30363d;
      border-top-color: #58a6ff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    .loading-text {
      font-size: 12px;
      color: #8b949e;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div id="root">
    <div id="loading">
      <div class="spinner"></div>
      <span class="loading-text">Loading profiler…</span>
    </div>
  </div>
  <script type="module" src="./main.tsx"></script>
</body>
</html>
